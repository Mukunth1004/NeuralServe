version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/neuralserve
      USE_ONNX: "false"
      MODEL_NAME: distilbert-base-uncased-finetuned-sst-2-english
      LOG_LEVEL: INFO
      MAX_BATCH_SIZE: "32"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./models:/app/models
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: neuralserve
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
